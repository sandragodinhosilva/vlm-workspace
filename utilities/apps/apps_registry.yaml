# Gradio app registry — used by launch_app.sh
# Each entry: name, repo, script, port, venv, goal, env (optional), args (optional)
# Ports are unique (7860-7873, 8080); no two apps share a port.
# Tunnel local port = remote port + 10000 (e.g. remote 7862 → local 17862).
#
# Port table (all unique — all apps can run concurrently):
#   7860  reasoning-prompt    reasoning_trace_prompt_app.py
#   7861  monitoring          apps/monitoring-app/app.py
#   7862  video-sft           video-sft-vlm/app.py          ← main browse app
#   7863  browser             vlm-post-training/web/browser-app/app.py
#   7864  vo-severity         web/single_stage_compare_app.py
#   7865  vo-compare          web/human_visual_obs_compare_app.py
#   7866  sft-data            sft-data-vlm/app.py
#   7867  llm-fms             web/llm_fms_viewer.py
#   7868  multimodal-compare  web/multimodal_compare_app.py
#   7869  reas-inspector      aux_tasks/sft/inspect/inspect_reas2_mix_gradio.py
#   7870  prejudge-viewer     video-sft-vlm/prejudge_viewer.py
#   7871  mesh-viewer         video-sft-vlm/mesh_viewer.py
#   7872  sword-viewer        sam3d_pilot/sword_viewer.py
#   7873  grpo-dashboard      utilities/apps/grpo_dashboard.py
#   7874  vibe-test           utilities/apps/vibe_test.py
#   7875  sft-dashboard       utilities/apps/sft_dashboard.py
#   7876  vobs-schema         utilities/apps/vobs_schema_inspector.py
#   8080  claude-tracker      utilities/apps/claude-tracker.py

# Entries are grouped into 6 WORKSTREAMS (banner comments below). Each entry also
# carries a `workstream:` field so the grouping is machine-readable, not just visual.
#   General · Visual Observations · Aux Tasks · 3D · Training · Utilities

apps:

  # ══ GENERAL ════════════════════════════════════════════════════════════════
  #   Cross-cutting browse + live-inference tools, not tied to one task family.

  video-sft:
    label: "Video SFT browser (MCQA)"
    workstream: General
    goal: "Browse generated MCQA video samples; inspect exercise types, tier, messages. Quick-load dropdown switches datasets without restart."
    repo: /home/sgsilva/video-sft-vlm
    script: app.py
    port: 7862
    venv: /home/sgsilva/video-sft-vlm-home-venv/bin/python
    # Set DEFAULT_JSONL to pick which browse dataset to load on startup.
    # Omit to use the app's built-in default, or use the in-app dropdown.
    env:
      DEFAULT_JSONL: /mnt/data/sgsilva/datasets/app_video_datasets/1805_merged_reasoning_v2_browse.jsonl

  browser:
    label: "Dataset browser (image / video / text tabs)"
    workstream: General
    goal: "Multi-tab browser for all post-training datasets: image, video, text, and reasoning tabs."
    repo: /home/sgsilva/vlm-post-training/web/browser-app
    script: app.py
    port: 7863
    venv: /home/sgsilva/browser-app-home-venv/bin/python
    env:
      BROWSER_MIXED_ROOT: /mnt/data/shared/vlm/data/merged_aux_datasets/reas2_mix_image10k_text5k_video10k_0804

  vibe-test:
    label: "VLM vibe tester — FREE-FORM live inference on ANY served model (play with prompts)"
    workstream: General
    goal: "Free-form inference playground: send ANY text / image / video to any live vLLM server (cluster scan, ports 8000-8003) OR Vertex/gemini, inspect answer + thinking trace, score vs GT (canonical severity board). Use to PLAY WITH PROMPTS / verify a model's reasoning LIVE. NOT for tuning dataset-generation prompts (that's reasoning-prompt)."
    repo: /home/sgsilva/utilities/apps
    script: vibe_test.py
    port: 7874
    venv: /home/sgsilva/video-sft-vlm-home-venv/bin/python

  # ══ VISUAL OBSERVATIONS ════════════════════════════════════════════════════
  #   VO eval-output comparison + tuning the prompts that generate VO datasets.
  #   NOTE: vo-severity + vo-compare are slated to merge into one 2-tab app
  #   (vo-inspector) — deferred 2026-06-25; kept as 2 entries until then.

  vo-severity:
    label: "VO severity comparator (single-stage A vs B)"
    workstream: Visual Observations
    goal: "Compare two single/two-stage eval runs side-by-side: per-rep error detection + video."
    repo: /home/sgsilva/vlm-post-training
    script: web/single_stage_compare_app.py
    port: 7864
    venv: /home/sgsilva/vlm-post-training-home-venv/bin/python
    # Add --results "label=path" args at launch time, e.g.:
    #   launch_app.sh vo-severity --results "SFT=/mnt/data/sgsilva/results/..."

  vo-compare:
    label: "VO stage-1 comparator (side-by-side observations)"
    workstream: Visual Observations
    goal: "Side-by-side visual observations across multiple VLMs vs human ground-truth."
    repo: /home/sgsilva/vlm-post-training
    script: web/human_visual_obs_compare_app.py
    port: 7865
    venv: /home/sgsilva/vlm-post-training-home-venv/bin/python
    # Add --results "label=path" args at launch time.
    # RAW-browse mode (no model needed): --raw-cohort <processed-dir> indexes every rep's
    #   annotation.json directly (e.g. 1806_after_format_review_processed). See /apps SKILL.md.

  vobs-schema:
    label: "VObs schema inspector (angle vs categorical; --version, default 2906)"
    workstream: Visual Observations
    goal: "Read-only browse of a visual-observations schema pair (visual_observations_{angle,categorical}_2906.json): per-exercise cards (241 ex / 1758 q), questions NEW/changed-vs-baseline flagged (incl. the net-new coverage entries promoted into 2906), each angle question shown in BOTH its angle and categorical-ladder shape. Toggles: text filter, NEW-only, angle-only, Group-by-family (sibling-gap flags), vs-v2 (cumulative diff since the v2 training baseline). Version-parameterized via --version v2|2906 (default 2906 = FINAL, was v5_1; intermediates v3/v4/v5/v5_1 archived). No model / no GPU."
    repo: /home/sgsilva/utilities/apps
    script: vobs_schema_inspector.py
    port: 7876
    venv: /home/sgsilva/vlm-post-training-home-venv/bin/python

  reasoning-prompt:
    label: "Reasoning-trace prompt editor — TUNE dataset-GENERATION prompts (4 task formatters)"
    workstream: Visual Observations
    goal: "Iterate on the add_reasoning_* TEACHER prompts that BUILD reasoning datasets, across all 4 task formatters (rep_severity / full_exercise / visual_obs / two-video comparison), with on-disk {task_section} substitution + live teacher call + A/B/C/D variant sweep + stored-trace variant-compare. NOT a free-form playground — for that use vibe-test."
    repo: /home/sgsilva/vlm-post-training/web
    script: reasoning_trace_prompt_app.py
    port: 7860
    venv: /home/sgsilva/vlm-post-training-home-venv/bin/python

  # ══ AUX TASKS ══════════════════════════════════════════════════════════════
  #   Text/image SFT data QC + the reas2 mix + multimodal keypoint eval.

  sft-data:
    label: "SFT data browser (text MCQA)"
    workstream: Aux Tasks
    goal: "Browse and QC text-based SFT datasets (5 MCQA families) from the Thrive VLM database."
    repo: /home/sgsilva/sft-data-vlm
    script: app.py
    port: 7866
    venv: /home/sgsilva/vlm-post-training-home-venv/bin/python

  llm-fms:
    label: "LLM-FMS viewer (image+text SFT rows)"
    workstream: Aux Tasks
    goal: "Inspect image-based LLM-FMS SFT rows: image + prompt + target + metadata."
    repo: /home/sgsilva/vlm-post-training
    script: web/llm_fms_viewer.py
    port: 7867
    venv: /home/sgsilva/vlm-post-training-home-venv/bin/python
    # Pass --dataset /path/to/hf at launch time.

  reas-inspector:
    label: "Reas-mix inspector (reas2 merged mix)"
    workstream: Aux Tasks
    goal: "Quick inspector for the reas2 merged reasoning mix: filter by modality and judge verdict."
    repo: /home/sgsilva/vlm-post-training/aux_tasks/sft
    script: inspect/inspect_reas2_mix_gradio.py
    port: 7869
    venv: /home/sgsilva/browser-app-home-venv/bin/python
    args:
      - --root
      - /mnt/data/shared/vlm/data/merged_aux_datasets/reas2_mix_image10k_text5k_video10k_0804
      - --host
      - 0.0.0.0

  multimodal-compare:
    label: "Multimodal eval comparer (keypoint side-by-side)"
    workstream: Aux Tasks
    goal: "Side-by-side multimodal eval run comparison with COCO keypoint overlay."
    repo: /home/sgsilva/vlm-post-training
    script: web/multimodal_compare_app.py
    port: 7868
    venv: /home/sgsilva/vlm-post-training-home-venv/bin/python

  prejudge-viewer:
    label: "Prejudge viewer (LLM prejudge smoke)"
    workstream: Aux Tasks
    goal: "Inspect LLM prejudge smoke verdicts alongside video frames and post-hoc labels."
    repo: /home/sgsilva/video-sft-vlm
    script: prejudge_viewer.py
    port: 7870
    venv: /home/sgsilva/video-sft-vlm-home-venv/bin/python

  # ══ 3D ═════════════════════════════════════════════════════════════════════
  #   SAM-3D mesh/pose inspection.

  mesh-viewer:
    label: "Mesh viewer (SAM-3D overlays)"
    workstream: 3D
    goal: "Browse SAM-3D-Body overlay videos: mesh render + interactive 3D skeleton + angle signals."
    repo: /home/sgsilva/video-sft-vlm
    script: mesh_viewer.py
    port: 7871
    venv: /home/sgsilva/video-sft-vlm-home-venv/bin/python

  sword-viewer:
    label: "SWORD SAM-3D viewer (pipeline outputs)"
    workstream: 3D
    goal: "Browse SWORD SAM-3D pipeline outputs: 2D overlay + interactive 3D skeleton + mesh."
    repo: /home/sgsilva/vlm-post-training/aux_tasks/video_tasks/video_mcqa/sam3d_pilot
    script: sword_viewer.py
    port: 7872
    venv: /home/sgsilva/video-sft-vlm-home-venv/bin/python

  # ══ TRAINING ═══════════════════════════════════════════════════════════════
  #   Training-run dashboards (GRPO + SFT).

  grpo-dashboard:
    label: "GRPO training dashboard"
    workstream: Training
    goal: "Explore and compare GRPO training runs: reward curves, task breakdowns, + Live Status (pre-step-1 phase/val@start/log tail)."
    repo: /home/sgsilva/utilities/apps
    script: grpo_dashboard.py
    port: 7873
    venv: /home/sgsilva/vlm-post-training-home-venv/bin/python

  sft-dashboard:
    label: "SFT training dashboard"
    workstream: Training
    goal: "Live SFT-run visibility: loss / grad-norm / lr curves, val-loss at save points, step timing + throughput, per-node GPU/host health, and a config-intelligence panel (SWEPT vs FROZEN-knob drift + fit-in-memory guardrail audit). Reads tensorboard event files from nemo-rl-vlm/logs/<run>/exp_NNN/tensorboard. 🟢 = run active in last 10 min."
    repo: /home/sgsilva/utilities/apps
    script: sft_dashboard.py
    port: 7875
    # MUST be the in-repo nemo .venv — it's the only env with `tensorboard`
    # (the event-file reader). The cu12/eval venvs do NOT have it.
    venv: /home/sgsilva/nemo-rl-vlm/.venv/bin/python

  # ══ UTILITIES ══════════════════════════════════════════════════════════════
  #   Infra / health / cost dashboards — meta-tooling, not per-task browsers.

  monitoring:
    label: "Monitoring dashboard (datasets / training / eval)"
    workstream: Utilities
    goal: "Pipeline health dashboard — datasets, training metrics, and eval results in one view."
    repo: /home/sgsilva/utilities/apps/monitoring-app
    script: app.py
    port: 7861
    venv: /home/sgsilva/browser-app-home-venv/bin/python

  claude-tracker:
    label: "Claude usage tracker (token cost dashboard)"
    workstream: Utilities
    goal: "Local dashboard for Claude Code token usage and cost estimates across sessions."
    repo: /home/sgsilva/utilities/apps
    script: claude-tracker.py
    port: 8080
    venv: python3
